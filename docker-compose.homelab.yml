services:
  mysql:
    image: mysql:8.4
    container_name: sigma-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-sigma}
      MYSQL_USER: ${MYSQL_USER:-sigma}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/marlondantas/sigma-api:latest
    container_name: sigma-api
    restart: unless-stopped
    environment:
      PORT: 3001
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-sigma}
      DB_USER: ${MYSQL_USER:-sigma}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN}
    ports:
      - "3001:3001"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
